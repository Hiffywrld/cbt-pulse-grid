databases:
  - name: cbt-pulse-grid-postgres
    databaseName: cbt_pulse_grid
    user: cbt_pulse_grid_user
    plan: free

services:
  - type: web
    name: cbt-pulse-grid-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health/readiness
    envVars:
      - key: POSTGRES_HOST
        fromDatabase:
          name: cbt-pulse-grid-postgres
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: cbt-pulse-grid-postgres
          property: port
      - key: POSTGRES_DB
        fromDatabase:
          name: cbt-pulse-grid-postgres
          property: database
      - key: POSTGRES_USER
        fromDatabase:
          name: cbt-pulse-grid-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: cbt-pulse-grid-postgres
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ISSUER
        value: cbt-pulse-grid
      - key: JWT_ACCESS_TOKEN_EXPIRY
        value: 15m
      - key: JWT_REFRESH_TOKEN_EXPIRY
        value: 7d
      - key: REST_CORS_ALLOWED_ORIGINS
        value: https://<frontend-service-name>.onrender.com
      - key: MONITORING_WEBSOCKET_ALLOWED_ORIGINS
        value: https://<frontend-service-name>.onrender.com
      - key: WEBHOOK_ENABLED
        value: "false"
      - key: WEBHOOK_MASTER_KEY
        sync: false
      - key: WEBHOOK_ALLOW_PRIVATE_HTTP
        value: "false"
      - key: BOOTSTRAP_ADMIN_ENABLED
        value: "true"
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false

  - type: web
    name: cbt-pulse-grid-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://<backend-service-name>.onrender.com
      - key: VITE_WS_URL
        value: wss://<backend-service-name>.onrender.com/ws
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
