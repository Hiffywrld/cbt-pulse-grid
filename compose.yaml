services:
  postgres:
    image: postgres:17-alpine
    container_name: cbt-pulse-grid-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbt_pulse_grid}
      POSTGRES_USER: ${POSTGRES_USER:-cbt_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbt_dev_password}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cbt-pulse-grid

  backend:
    build:
      context: ./backend
    image: cbt-pulse-grid-backend:local
    container_name: cbt-pulse-grid-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-cbt_pulse_grid}
      POSTGRES_USER: ${POSTGRES_USER:-cbt_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cbt_dev_password}
      REST_CORS_ALLOWED_ORIGINS: ${REST_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      MONITORING_WEBSOCKET_ALLOWED_ORIGINS: ${MONITORING_WEBSOCKET_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      JWT_SECRET: ${JWT_SECRET:-cbt-pulse-grid-local-development-secret-2026}
      JWT_ISSUER: ${JWT_ISSUER:-cbt-pulse-grid}
      JWT_ACCESS_TOKEN_EXPIRY: ${JWT_ACCESS_TOKEN_EXPIRY:-15m}
      JWT_REFRESH_TOKEN_EXPIRY: ${JWT_REFRESH_TOKEN_EXPIRY:-7d}
      BOOTSTRAP_ADMIN_ENABLED: ${BOOTSTRAP_ADMIN_ENABLED:-true}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-admin@cbtpulse.local}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-Admin123!}
      ATTEMPT_EXPIRY_SCAN_INTERVAL: ${ATTEMPT_EXPIRY_SCAN_INTERVAL:-10s}
      ATTEMPT_EXPIRY_BATCH_SIZE: ${ATTEMPT_EXPIRY_BATCH_SIZE:-50}
      MONITORING_HEARTBEAT_SCAN_INTERVAL: ${MONITORING_HEARTBEAT_SCAN_INTERVAL:-10s}
      MONITORING_HEARTBEAT_TIMEOUT: ${MONITORING_HEARTBEAT_TIMEOUT:-30s}
      MONITORING_HEARTBEAT_BATCH_SIZE: ${MONITORING_HEARTBEAT_BATCH_SIZE:-100}
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_MASTER_KEY: ${WEBHOOK_MASTER_KEY:-}
      WEBHOOK_ALLOW_PRIVATE_HTTP: ${WEBHOOK_ALLOW_PRIVATE_HTTP:-false}
      WEBHOOK_CONNECT_TIMEOUT: ${WEBHOOK_CONNECT_TIMEOUT:-3s}
      WEBHOOK_RESPONSE_TIMEOUT: ${WEBHOOK_RESPONSE_TIMEOUT:-5s}
      WEBHOOK_SCAN_INTERVAL: ${WEBHOOK_SCAN_INTERVAL:-5s}
      WEBHOOK_LEASE_DURATION: ${WEBHOOK_LEASE_DURATION:-30s}
      WEBHOOK_INITIAL_BACKOFF: ${WEBHOOK_INITIAL_BACKOFF:-10s}
      WEBHOOK_MAXIMUM_BACKOFF: ${WEBHOOK_MAXIMUM_BACKOFF:-15m}
      WEBHOOK_BATCH_SIZE: ${WEBHOOK_BATCH_SIZE:-25}
      WEBHOOK_MAXIMUM_ATTEMPTS: ${WEBHOOK_MAXIMUM_ATTEMPTS:-8}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/actuator/health/readiness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - cbt-pulse-grid

  frontend:
    build:
      context: ./frontend
    image: cbt-pulse-grid-frontend:local
    container_name: cbt-pulse-grid-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
      VITE_WS_URL: ${FRONTEND_WS_URL:-/ws}
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - cbt-pulse-grid

volumes:
  postgres_data:

networks:
  cbt-pulse-grid:
    driver: bridge
