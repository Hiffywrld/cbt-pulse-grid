server:
  port: 8080

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:cbt_pulse_grid}
    username: ${POSTGRES_USER:cbt_admin}
    password: ${POSTGRES_PASSWORD:cbt_dev_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true

app:
  jwt:
    issuer: ${JWT_ISSUER:cbt-pulse-grid}
    access-token-expiry: ${JWT_ACCESS_TOKEN_EXPIRY:15m}
    refresh-token-expiry: ${JWT_REFRESH_TOKEN_EXPIRY:7d}
    secret: ${JWT_SECRET:cbt-pulse-grid-local-development-secret-2026}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:true}
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@cbtpulse.local}
    password: "${BOOTSTRAP_ADMIN_PASSWORD:Admin123!}"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
