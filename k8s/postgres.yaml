apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cbt-pulse-grid-postgres-data
  namespace: cbt-pulse-grid
  labels:
    app.kubernetes.io/name: cbt-pulse-grid
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cbt-pulse-grid-postgres
  namespace: cbt-pulse-grid
  labels:
    app.kubernetes.io/name: cbt-pulse-grid
    app.kubernetes.io/component: postgres
spec:
  serviceName: cbt-pulse-grid-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cbt-pulse-grid
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cbt-pulse-grid
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:17-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cbt-pulse-grid-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: cbt-pulse-grid-secrets
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cbt-pulse-grid-secrets
                  key: POSTGRES_PASSWORD
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\""]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: cbt-pulse-grid-postgres-data
