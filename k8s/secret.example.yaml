apiVersion: v1
kind: Secret
metadata:
  name: cbt-pulse-grid-secrets
  namespace: cbt-pulse-grid
  labels:
    app.kubernetes.io/name: cbt-pulse-grid
type: Opaque
stringData:
  POSTGRES_USER: <replace-with-database-user>
  POSTGRES_PASSWORD: <replace-with-database-password>
  JWT_SECRET: <replace-with-at-least-32-random-characters>
  WEBHOOK_MASTER_KEY: <replace-with-base64-encoded-32-byte-key>
  BOOTSTRAP_ADMIN_EMAIL: <replace-with-initial-admin-email>
  BOOTSTRAP_ADMIN_PASSWORD: <replace-with-initial-admin-password>
