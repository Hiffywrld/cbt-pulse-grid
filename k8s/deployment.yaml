apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-pulse-grid-backend
  namespace: cbt-pulse-grid
  labels:
    app.kubernetes.io/name: cbt-pulse-grid
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cbt-pulse-grid
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cbt-pulse-grid
        app.kubernetes.io/component: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/<owner>/<repository>/cbt-pulse-grid-backend:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cbt-pulse-grid-config
            - secretRef:
                name: cbt-pulse-grid-secrets
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbt-pulse-grid-frontend
  namespace: cbt-pulse-grid
  labels:
    app.kubernetes.io/name: cbt-pulse-grid
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cbt-pulse-grid
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cbt-pulse-grid
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/<owner>/<repository>/cbt-pulse-grid-frontend:<tag>
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: cbt-pulse-grid-config
                  key: VITE_API_BASE_URL
            - name: VITE_WS_URL
              valueFrom:
                configMapKeyRef:
                  name: cbt-pulse-grid-config
                  key: VITE_WS_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
